  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"zh-TW\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>能量日誌<\u002Ftitle>\n    <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n    <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n    <style>@font-face {\n  font-family: 'Noto Serif TC';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"50f3d812-e228-4fe0-9877-aa10cbf8b8c0\") format('woff2');\n  unicode-range: U+30-39, U+4e00, U+4e09, U+4e8c, U+4e94, U+4eca, U+516d, U+52d5, U+53cd, U+56db, U+5929, U+5b8c, U+5e74, U+5fc3, U+601d, U+6069, U+611f, U+614b, U+6210, U+65e5, U+661f, U+665a, U+6708, U+671f, U+6d3b, U+72c0, U+7406, U+7684, U+7d00, U+8207, U+9304;\n}\n<\u002Fstyle>\n    <style>\n        * {\n            margin: 0;\n            padding: 0;\n            box-sizing: border-box;\n        }\n\n        :root {\n            --bg: #1a1625;\n            --card: rgba(255,255,255,0.05);\n            --border: rgba(255,255,255,0.1);\n            --text: #e8dcc8;\n            --text-muted: rgba(232,220,200,0.5);\n            --accent: #f0a868;\n            --success: #66bb6a;\n        }\n\n        body {\n            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n            background: linear-gradient(135deg, #1a1625 0%, #0f0a18 100%);\n            color: var(--text);\n            min-height: 100vh;\n            padding: 20px;\n        }\n\n        .container {\n            max-width: 480px;\n            margin: 0 auto;\n        }\n\n        .header {\n            text-align: center;\n            margin-bottom: 30px;\n            padding-top: 10px;\n        }\n\n        .header h1 {\n            font-size: 28px;\n            font-weight: 600;\n            font-family: 'Noto Serif TC', serif;\n            margin-bottom: 8px;\n            letter-spacing: 0.5px;\n        }\n\n        .header p {\n            font-size: 14px;\n            color: var(--text-muted);\n        }\n\n        .card {\n            background: var(--card);\n            border: 1px solid var(--border);\n            border-radius: 20px;\n            padding: 24px;\n            margin-bottom: 16px;\n            backdrop-filter: blur(10px);\n        }\n\n        .card-title {\n            font-size: 16px;\n            font-weight: 600;\n            font-family: 'Noto Serif TC', serif;\n            color: var(--accent);\n            margin-bottom: 20px;\n            text-align: center;\n            letter-spacing: 1px;\n        }\n\n        .slider-group {\n            margin-bottom: 24px;\n        }\n\n        .slider-label {\n            display: flex;\n            justify-content: space-between;\n            align-items: center;\n            margin-bottom: 10px;\n            font-size: 14px;\n        }\n\n        .slider-label span:first-child {\n            font-weight: 500;\n        }\n\n        .slider-value {\n            display: flex;\n            align-items: center;\n            gap: 8px;\n        }\n\n        .slider-value .num {\n            font-size: 20px;\n            font-weight: 700;\n            color: var(--accent);\n            min-width: 30px;\n        }\n\n        .slider-value .word {\n            font-size: 13px;\n            color: var(--text-muted);\n        }\n\n        input[type=\"range\"] {\n            width: 100%;\n            height: 6px;\n            border-radius: 10px;\n            background: linear-gradient(to right, rgba(240,168,104,0.2), var(--accent));\n            outline: none;\n            -webkit-appearance: none;\n            cursor: pointer;\n        }\n\n        input[type=\"range\"]::-webkit-slider-thumb {\n            -webkit-appearance: none;\n            width: 24px;\n            height: 24px;\n            border-radius: 50%;\n            background: white;\n            border: 3px solid var(--accent);\n            cursor: pointer;\n            box-shadow: 0 3px 10px rgba(0,0,0,0.3);\n        }\n\n        input[type=\"range\"]::-moz-range-thumb {\n            width: 24px;\n            height: 24px;\n            border-radius: 50%;\n            background: white;\n            border: 3px solid var(--accent);\n            cursor: pointer;\n            box-shadow: 0 3px 10px rgba(0,0,0,0.3);\n        }\n\n        .activities {\n            display: grid;\n            grid-template-columns: 1fr 1fr;\n            gap: 12px;\n        }\n\n        .activity-btn {\n            background: rgba(255,255,255,0.04);\n            border: 1px solid var(--border);\n            border-radius: 16px;\n            padding: 16px 12px;\n            cursor: pointer;\n            transition: all 0.25s ease;\n            color: var(--text-muted);\n            font-size: 14px;\n            font-weight: 600;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            gap: 10px;\n            text-align: center;\n        }\n\n        .activity-btn:hover {\n            background: rgba(255,255,255,0.08);\n        }\n\n        .activity-btn.active {\n            background: rgba(240,168,104,0.15);\n            border-color: rgba(240,168,104,0.8);\n            color: #f0b888;\n            box-shadow: 0 4px 12px rgba(240,168,104,0.15);\n        }\n\n        .activity-icon {\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            height: 40px;\n        }\n\n        textarea {\n            width: 100%;\n            padding: 14px;\n            border: 1px solid var(--border);\n            border-radius: 14px;\n            background: rgba(255,255,255,0.04);\n            color: var(--text);\n            font-size: 16px;\n            font-family: inherit;\n            resize: none;\n            outline: none;\n            transition: all 0.2s ease;\n            min-height: 80px;\n        }\n\n        textarea:focus {\n            background: rgba(255,255,255,0.08);\n            border-color: var(--accent);\n        }\n\n        textarea::placeholder {\n            color: var(--text-muted);\n        }\n\n        .text-group {\n            margin-bottom: 20px;\n        }\n\n        .text-label {\n            font-size: 13px;\n            color: var(--text-muted);\n            margin-bottom: 8px;\n            font-weight: 500;\n        }\n\n        .char-count {\n            font-size: 12px;\n            color: var(--text-muted);\n            text-align: right;\n            margin-top: 5px;\n        }\n\n        .error {\n            background: rgba(220,90,90,0.15);\n            border: 1px solid rgba(220,90,90,0.4);\n            color: #ff9999;\n            padding: 12px 14px;\n            border-radius: 12px;\n            font-size: 13px;\n            margin-bottom: 16px;\n            display: none;\n        }\n\n        .error.show {\n            display: block;\n        }\n\n        .submit-btn {\n            width: 100%;\n            padding: 16px;\n            background: linear-gradient(135deg, #f0b888 0%, #e8835a 100%);\n            color: #2a1c12;\n            border: none;\n            border-radius: 14px;\n            font-size: 18px;\n            font-weight: 600;\n            font-family: 'Noto Serif TC', serif;\n            cursor: pointer;\n            transition: all 0.2s ease;\n            letter-spacing: 1px;\n            box-shadow: 0 8px 24px rgba(232,131,90,0.3);\n            margin-top: 8px;\n        }\n\n        .submit-btn:hover:not(:disabled) {\n            transform: translateY(-2px);\n            box-shadow: 0 12px 32px rgba(232,131,90,0.4);\n        }\n\n        .submit-btn:disabled {\n            opacity: 0.7;\n            cursor: not-allowed;\n        }\n\n        .success-modal {\n            position: fixed;\n            inset: 0;\n            background: rgba(10,5,20,0.7);\n            display: none;\n            align-items: center;\n            justify-content: center;\n            z-index: 100;\n            backdrop-filter: blur(3px);\n        }\n\n        .success-modal.show {\n            display: flex;\n        }\n\n        .success-card {\n            background: #1a1625;\n            border: 1px solid var(--border);\n            border-radius: 24px;\n            padding: 40px 30px;\n            text-align: center;\n            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);\n            max-width: 280px;\n        }\n\n        .success-icon {\n            width: 56px;\n            height: 56px;\n            border-radius: 50%;\n            background: rgba(240,168,104,0.15);\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            margin: 0 auto 16px;\n            font-size: 32px;\n        }\n\n        .success-title {\n            font-size: 22px;\n            font-weight: 600;\n            margin-bottom: 8px;\n            color: var(--text);\n        }\n\n        .success-text {\n            font-size: 14px;\n            color: var(--text-muted);\n            line-height: 1.6;\n        }\n\n        @keyframes popIn {\n            from {\n                transform: scale(0.7);\n                opacity: 0;\n            }\n            to {\n                transform: scale(1);\n                opacity: 1;\n            }\n        }\n    <\u002Fstyle>\n<\u002Fhead>\n<body>\n    \n    <div class=\"container\">\n        <div class=\"header\">\n            <h1 id=\"dateStr\">今天<\u002Fh1>\n            <p>晚間記錄 · 今晚也辛苦了<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"error\" id=\"errorMsg\"><\u002Fdiv>\n\n        <!-- 心理狀態 -->\n        <div class=\"card\">\n            <div class=\"card-title\">心理狀態<\u002Fdiv>\n            \n            <div class=\"slider-group\">\n                <div class=\"slider-label\">\n                    <span>壓力分數<\u002Fspan>\n                    <div class=\"slider-value\">\n                        <span class=\"word\" id=\"pressureWord\">還好<\u002Fspan>\n                        <span class=\"num\" id=\"pressureNum\">5<\u002Fspan>\n                    <\u002Fdiv>\n                <\u002Fdiv>\n                <input type=\"range\" id=\"pressure\" min=\"1\" max=\"10\" value=\"5\">\n            <\u002Fdiv>\n\n            <div class=\"slider-group\">\n                <div class=\"slider-label\">\n                    <span>思路清晰度<\u002Fspan>\n                    <div class=\"slider-value\">\n                        <span class=\"word\" id=\"clarityWord\">普通<\u002Fspan>\n                        <span class=\"num\" id=\"clarityNum\">5<\u002Fspan>\n                    <\u002Fdiv>\n                <\u002Fdiv>\n                <input type=\"range\" id=\"clarity\" min=\"1\" max=\"10\" value=\"5\">\n            <\u002Fdiv>\n\n            <div class=\"slider-group\">\n                <div class=\"slider-label\">\n                    <span>睡前電量<\u002Fspan>\n                    <div class=\"slider-value\">\n                        <span class=\"word\" id=\"energyWord\">一半<\u002Fspan>\n                        <span class=\"num\" id=\"energyNum\">5<\u002Fspan>\n                    <\u002Fdiv>\n                <\u002Fdiv>\n                <input type=\"range\" id=\"energy\" min=\"1\" max=\"10\" value=\"5\">\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 今日活動 -->\n        <div class=\"card\">\n            <div class=\"card-title\">今日活動<\u002Fdiv>\n            <div class=\"activities\">\n                <button class=\"activity-btn\" id=\"walkBtn\" onclick=\"toggleActivity('walk')\">\n                    <span class=\"activity-icon\">\n                        <svg width=\"38\" height=\"38\" viewBox=\"0 0 40 40\" fill=\"currentColor\">\n                            <ellipse cx=\"15\" cy=\"14\" rx=\"4.2\" ry=\"6.2\" transform=\"rotate(-14 15 14)\"><\u002Fellipse>\n                            <ellipse cx=\"25\" cy=\"26\" rx=\"4.2\" ry=\"6.2\" opacity=\"0.5\" transform=\"rotate(-14 25 26)\"><\u002Fellipse>\n                        <\u002Fsvg>\n                    <\u002Fspan>\n                    <span>散步<\u002Fspan>\n                <\u002Fbutton>\n                <button class=\"activity-btn\" id=\"meditateBtn\" onclick=\"toggleActivity('meditate')\">\n                    <span class=\"activity-icon\">\n                        <svg width=\"38\" height=\"38\" viewBox=\"0 0 40 40\" fill=\"currentColor\">\n                            <circle cx=\"20\" cy=\"20\" r=\"3.6\"><\u002Fcircle>\n                            <circle cx=\"20\" cy=\"20\" r=\"8.5\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" opacity=\"0.5\"><\u002Fcircle>\n                            <circle cx=\"20\" cy=\"20\" r=\"13.5\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" opacity=\"0.25\"><\u002Fcircle>\n                            <circle cx=\"20\" cy=\"4.2\" r=\"1.6\"><\u002Fcircle>\n                            <circle cx=\"20\" cy=\"35.8\" r=\"1.6\"><\u002Fcircle>\n                            <circle cx=\"4.2\" cy=\"20\" r=\"1.6\"><\u002Fcircle>\n                            <circle cx=\"35.8\" cy=\"20\" r=\"1.6\"><\u002Fcircle>\n                            <circle cx=\"8.8\" cy=\"8.8\" r=\"1.3\" opacity=\"0.7\"><\u002Fcircle>\n                            <circle cx=\"31.2\" cy=\"8.8\" r=\"1.3\" opacity=\"0.7\"><\u002Fcircle>\n                            <circle cx=\"8.8\" cy=\"31.2\" r=\"1.3\" opacity=\"0.7\"><\u002Fcircle>\n                            <circle cx=\"31.2\" cy=\"31.2\" r=\"1.3\" opacity=\"0.7\"><\u002Fcircle>\n                        <\u002Fsvg>\n                    <\u002Fspan>\n                    <span>冥想<\u002Fspan>\n                <\u002Fbutton>\n                <button class=\"activity-btn\" id=\"strengthBtn\" onclick=\"toggleActivity('strength')\">\n                    <span class=\"activity-icon\">\n                        <svg width=\"38\" height=\"38\" viewBox=\"0 0 40 40\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n                            <path d=\"M6 8 Q20 4.5 34 8\"><\u002Fpath>\n                            <rect x=\"2.6\" y=\"4.4\" width=\"3.2\" height=\"7.2\" rx=\"1.4\" fill=\"currentColor\" stroke=\"none\"><\u002Frect>\n                            <rect x=\"34.2\" y=\"4.4\" width=\"3.2\" height=\"7.2\" rx=\"1.4\" fill=\"currentColor\" stroke=\"none\"><\u002Frect>\n                            <circle cx=\"20\" cy=\"14\" r=\"3.5\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle>\n                            <path d=\"M8 8 L16 19.5\"><\u002Fpath>\n                            <path d=\"M32 8 L24 19.5\"><\u002Fpath>\n                            <path d=\"M16 19.5 H24\"><\u002Fpath>\n                            <path d=\"M20 19.5 V28\"><\u002Fpath>\n                            <path d=\"M20 28 L14.5 36\"><\u002Fpath>\n                            <path d=\"M20 28 L25.5 36\"><\u002Fpath>\n                        <\u002Fsvg>\n                    <\u002Fspan>\n                    <span>重訓<\u002Fspan>\n                <\u002Fbutton>\n                <button class=\"activity-btn\" id=\"runBtn\" onclick=\"toggleActivity('run')\">\n                    <span class=\"activity-icon\">\n                        <svg width=\"40\" height=\"40\" viewBox=\"0 0 24 24\" fill=\"currentColor\">\n                            <path d=\"M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z\"><\u002Fpath>\n                        <\u002Fsvg>\n                    <\u002Fspan>\n                    <span>跑步<\u002Fspan>\n                <\u002Fbutton>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 感恩與反思 -->\n        <div class=\"card\">\n            <div class=\"card-title\">感恩與反思<\u002Fdiv>\n            \n            <div class=\"text-group\">\n                <div class=\"text-label\">輕量感恩<\u002Fdiv>\n                <textarea id=\"gratitude\" placeholder=\"今天，謝謝什麼？\" maxlength=\"100\"><\u002Ftextarea>\n                <div class=\"char-count\"><span id=\"gratitudeCount\">0<\u002Fspan>/100<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"text-group\">\n                <div class=\"text-label\">反思<\u002Fdiv>\n                <textarea id=\"reflection\" placeholder=\"任何想留下的觀察或想法⋯\" maxlength=\"100\"><\u002Ftextarea>\n                <div class=\"char-count\"><span id=\"reflectionCount\">0<\u002Fspan>/100<\u002Fdiv>\n            <\u002Fdiv>\n        <\u002Fdiv>\n\n        <button class=\"submit-btn\" id=\"submitBtn\" onclick=\"submitForm()\">完成今晚的紀錄 ✨<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"success-modal\" id=\"successModal\">\n        <div class=\"success-card\">\n            <div class=\"success-icon\">✓<\u002Fdiv>\n            <div class=\"success-title\">今晚完成<\u002Fdiv>\n            <div class=\"success-text\">你又好好走過了<br>美好的一天<\u002Fdiv>\n        <\u002Fdiv>\n    <\u002Fdiv>\n\n    <script>\n        // Google Apps Script URL\n        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzHkyqqM0vOus7M0B2IHIFhaktRTenSL7c_2t12OtlYF1RuvY1jn1mugQzsHcBmltwc/exec';\n\n        // 狀態\n        const state = {\n            pressure: 5,\n            clarity: 5,\n            energy: 5,\n            walk: false,\n            meditate: false,\n            strength: false,\n            run: false,\n            gratitude: '',\n            reflection: '',\n            submitting: false\n        };\n\n        // 初始化\n        function init() {\n            updateDate();\n            setupSliders();\n            setupTextareas();\n        }\n\n        function updateDate() {\n            const today = new Date();\n            const dateStr = today.toLocaleDateString('zh-TW', {\n                year: 'numeric',\n                month: 'long',\n                day: 'numeric'\n            }) + ' ' + today.toLocaleDateString('zh-TW', { weekday: 'long' });\n            document.getElementById('dateStr').textContent = dateStr;\n        }\n\n        function setupSliders() {\n            const sliders = ['pressure', 'clarity', 'energy'];\n            sliders.forEach(name => {\n                const slider = document.getElementById(name);\n                slider.addEventListener('input', (e) => {\n                    state[name] = parseInt(e.target.value);\n                    updateSliderDisplay(name);\n                });\n            });\n        }\n\n        function updateSliderDisplay(name) {\n            const val = state[name];\n            document.getElementById(name + 'Num').textContent = val;\n            \n            let word = '';\n            if (name === 'pressure') {\n                word = val <= 2 ? '很放鬆' : val <= 4 ? '平穩' : val <= 6 ? '還好' : val <= 8 ? '有點緊' : '很緊繃';\n            } else if (name === 'clarity') {\n                word = val <= 2 ? '很模糊' : val <= 4 ? '有點朦' : val <= 6 ? '普通' : val <= 8 ? '清晰' : '非常清晰';\n            } else if (name === 'energy') {\n                word = val <= 2 ? '快沒電' : val <= 4 ? '偏低' : val <= 6 ? '一半' : val <= 8 ? '充足' : '滿電';\n            }\n            document.getElementById(name + 'Word').textContent = word;\n        }\n\n        function setupTextareas() {\n            const textareas = ['gratitude', 'reflection'];\n            textareas.forEach(name => {\n                const ta = document.getElementById(name);\n                ta.addEventListener('input', (e) => {\n                    state[name] = e.target.value.slice(0, 100);\n                    document.getElementById(name + 'Count').textContent = state[name].length;\n                });\n            });\n        }\n\n        function toggleActivity(name) {\n            state[name] = !state[name];\n            const btn = document.getElementById(name + 'Btn');\n            btn.classList.toggle('active');\n        }\n\n        function submitForm() {\n            if (state.submitting) return;\n            \n            state.submitting = true;\n            document.getElementById('submitBtn').disabled = true;\n            document.getElementById('submitBtn').textContent = '正在記錄⋯';\n            document.getElementById('errorMsg').classList.remove('show');\n\n            const today = new Date();\n            const data = {\n                date: today.toISOString().split('T')[0],\n                壓力分數: state.pressure,\n                思路清晰度: state.clarity,\n                睡前電量: state.energy,\n                散步: state.walk,\n                冥想: state.meditate,\n                重訓: state.strength,\n                跑步: state.run,\n                輕量感恩: state.gratitude,\n                反思: state.reflection\n            };\n\n            // 使用 no-cors 模式\n            fetch(SCRIPT_URL, {\n                method: 'POST',\n                mode: 'no-cors',\n                body: JSON.stringify(data),\n                headers: { 'Content-Type': 'application/json' }\n            })\n            .then(response => {\n                // no-cors 模式下無法讀取響應，假設成功\n                showSuccess();\n                state.submitting = false;\n                resetForm();\n            })\n            .catch(err => {\n                showError('網路錯誤：' + err.message);\n                state.submitting = false;\n                document.getElementById('submitBtn').disabled = false;\n                document.getElementById('submitBtn').textContent = '完成今晚的紀錄 ✨';\n            });\n        }\n\n        function showSuccess() {\n            document.getElementById('successModal').classList.add('show');\n            setTimeout(() => {\n                document.getElementById('successModal').classList.remove('show');\n            }, 3000);\n        }\n\n        function showError(msg) {\n            const errorEl = document.getElementById('errorMsg');\n            errorEl.textContent = msg;\n            errorEl.classList.add('show');\n        }\n\n        function resetForm() {\n            document.getElementById('submitBtn').disabled = false;\n            document.getElementById('submitBtn').textContent = '完成今晚的紀錄 ✨';\n        }\n\n        // 頁面加載時初始化（若 DOM 已就緒則立即執行，確保離線打包版也能運作）\n        if (document.readyState === 'loading') {\n            document.addEventListener('DOMContentLoaded', init);\n        } else {\n            init();\n        }\n    <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能量日誌</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Noto Serif TC';
            font-style: normal;
            font-weight: 600;
            font-display: swap;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #1a1625;
            --card: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --text: #e8dcc8;
            --text-muted: rgba(232,220,200,0.5);
            --accent: #f0a868;
            --success: #66bb6a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1625 0%, #0f0a18 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            font-family: 'Noto Serif TC', serif;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .load-indicator {
            font-size: 12px;
            color: var(--accent);
            margin-top: 8px;
            min-height: 16px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .load-indicator.done {
            animation: none;
            opacity: 1;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            font-family: 'Noto Serif TC', serif;
            color: var(--accent);
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }

        .slider-group {
            margin-bottom: 24px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .slider-label span:first-child {
            font-weight: 500;
        }

        .slider-value {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider-value .num {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            min-width: 30px;
        }

        .slider-value .word {
            font-size: 13px;
            color: var(--text-muted);
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background: linear-gradient(to right, rgba(240,168,104,0.2), var(--accent));
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            border: 3px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .activities {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .activity-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
        }

        .activity-btn:hover {
            background: rgba(255,255,255,0.08);
        }

        .activity-btn.active {
            background: rgba(240,168,104,0.15);
            border-color: rgba(240,168,104,0.8);
            color: #f0b888;
            box-shadow: 0 4px 12px rgba(240,168,104,0.15);
        }

        .activity-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
        }

        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: all 0.2s ease;
            min-height: 80px;
        }

        textarea:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .text-group {
            margin-bottom: 20px;
        }

        .text-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .char-count {
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
            margin-top: 5px;
        }

        .error {
            background: rgba(220,90,90,0.15);
            border: 1px solid rgba(220,90,90,0.4);
            color: #ff9999;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f0b888 0%, #e8835a 100%);
            color: #2a1c12;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Noto Serif TC', serif;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
            box-shadow: 0 8px 24px rgba(232,131,90,0.3);
            margin-top: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(232,131,90,0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .success-modal {
            position: fixed;
            inset: 0;
            background: rgba(10,5,20,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(3px);
        }

        .success-modal.show {
            display: flex;
        }

        .success-card {
            background: #1a1625;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 280px;
        }

        .success-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(240,168,104,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
        }

        .success-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .success-text {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        @keyframes popIn {
            from {
                transform: scale(0.7);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="dateStr">今天</h1>
            <p>晚間記錄 · 今晚也辛苦了</p>
            <div class="load-indicator" id="loadIndicator"></div>
        </div>

        <div class="error" id="errorMsg"></div>

        <!-- 心理狀態 -->
        <div class="card">
            <div class="card-title">心理狀態</div>
            
            <div class="slider-group">
                <div class="slider-label">
                    <span>壓力分數</span>
                    <div class="slider-value">
                        <span class="word" id="pressureWord">還好</span>
                        <span class="num" id="pressureNum">5</span>
                    </div>
                </div>
                <input type="range" id="pressure" min="1" max="10" value="5">
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span>思路清晰度</span>
                    <div class="slider-value">
                        <span class="word" id="clarityWord">普通</span>
                        <span class="num" id="clarityNum">5</span>
                    </div>
                </div>
                <input type="range" id="clarity" min="1" max="10" value="5">
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span>睡前電量</span>
                    <div class="slider-value">
                        <span class="word" id="energyWord">一半</span>
                        <span class="num" id="energyNum">5</span>
                    </div>
                </div>
                <input type="range" id="energy" min="1" max="10" value="5">
            </div>
        </div>

        <!-- 今日活動 -->
        <div class="card">
            <div class="card-title">今日活動</div>
            <div class="activities">
                <button class="activity-btn" id="walkBtn" onclick="toggleActivity('walk')">
                    <span class="activity-icon">
                        <svg width="38" height="38" viewBox="0 0 40 40" fill="currentColor">
                            <ellipse cx="15" cy="14" rx="4.2" ry="6.2" transform="rotate(-14 15 14)"></ellipse>
                            <ellipse cx="25" cy="26" rx="4.2" ry="6.2" opacity="0.5" transform="rotate(-14 25 26)"></ellipse>
                        </svg>
                    </span>
                    <span>散步</span>
                </button>
                <button class="activity-btn" id="meditateBtn" onclick="toggleActivity('meditate')">
                    <span class="activity-icon">
                        <svg width="38" height="38" viewBox="0 0 40 40" fill="currentColor">
                            <circle cx="20" cy="20" r="3.6"></circle>
                            <circle cx="20" cy="20" r="8.5" fill="none" stroke="currentColor" stroke-width="2" opacity="0.5"></circle>
                            <circle cx="20" cy="20" r="13.5" fill="none" stroke="currentColor" stroke-width="1.6" opacity="0.25"></circle>
                            <circle cx="20" cy="4.2" r="1.6"></circle>
                            <circle cx="20" cy="35.8" r="1.6"></circle>
                            <circle cx="4.2" cy="20" r="1.6"></circle>
                            <circle cx="35.8" cy="20" r="1.6"></circle>
                            <circle cx="8.8" cy="8.8" r="1.3" opacity="0.7"></circle>
                            <circle cx="31.2" cy="8.8" r="1.3" opacity="0.7"></circle>
                            <circle cx="8.8" cy="31.2" r="1.3" opacity="0.7"></circle>
                            <circle cx="31.2" cy="31.2" r="1.3" opacity="0.7"></circle>
                        </svg>
                    </span>
                    <span>冥想</span>
                </button>
                <button class="activity-btn" id="strengthBtn" onclick="toggleActivity('strength')">
                    <span class="activity-icon">
                        <svg width="38" height="38" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 8 Q20 4.5 34 8"></path>
                            <rect x="2.6" y="4.4" width="3.2" height="7.2" rx="1.4" fill="currentColor" stroke="none"></rect>
                            <rect x="34.2" y="4.4" width="3.2" height="7.2" rx="1.4" fill="currentColor" stroke="none"></rect>
                            <circle cx="20" cy="14" r="3.5" fill="currentColor" stroke="none"></circle>
                            <path d="M8 8 L16 19.5"></path>
                            <path d="M32 8 L24 19.5"></path>
                            <path d="M16 19.5 H24"></path>
                            <path d="M20 19.5 V28"></path>
                            <path d="M20 28 L14.5 36"></path>
                            <path d="M20 28 L25.5 36"></path>
                        </svg>
                    </span>
                    <span>重訓</span>
                </button>
                <button class="activity-btn" id="runBtn" onclick="toggleActivity('run')">
                    <span class="activity-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"></path>
                        </svg>
                    </span>
                    <span>跑步</span>
                </button>
            </div>
        </div>

        <!-- 感恩與反思 -->
        <div class="card">
            <div class="card-title">感恩與反思</div>
            
            <div class="text-group">
                <div class="text-label">感恩日誌</div>
                <textarea id="gratitude" placeholder="今天，謝謝什麼？" maxlength="100"></textarea>
                <div class="char-count"><span id="gratitudeCount">0</span>/100</div>
            </div>

            <div class="text-group">
                <div class="text-label">反思</div>
                <textarea id="reflection" placeholder="任何想留下的觀察或想法⋯" maxlength="100"></textarea>
                <div class="char-count"><span id="reflectionCount">0</span>/100</div>
            </div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitForm()">完成今晚的紀錄 ✨</button>
    </div>

    <div class="success-modal" id="successModal">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <div class="success-title">今晚完成</div>
            <div class="success-text">你又好好走過了<br>美好的一天</div>
        </div>
    </div>

    <script>
        // 設定 Google Apps Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzHkyqqM0vOus7M0B2IHIFhaktRTenSL7c_2t12OtlYF1RuvY1jn1mugQzsHcBmltwc/exec';

        // 狀態物件
        const state = {
            pressure: 5,
            clarity: 5,
            energy: 5,
            walk: false,
            meditate: false,
            strength: false,
            run: false,
            gratitude: '',
            reflection: '',
            submitting: false
        };

        // 初始化
        function init() {
            updateDate();
            setupSliders();
            setupTextareas();
            loadTodayRecord(); // 預填充功能
        }

        function updateDate() {
            const today = new Date();
            const dateStr = today.toLocaleDateString('zh-TW', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            }) + ' ' + today.toLocaleDateString('zh-TW', { weekday: 'long' });
            document.getElementById('dateStr').textContent = dateStr;
        }

        function setupSliders() {
            const sliders = ['pressure', 'clarity', 'energy'];
            sliders.forEach(name => {
                const slider = document.getElementById(name);
                slider.addEventListener('input', (e) => {
                    state[name] = parseInt(e.target.value);
                    updateSliderDisplay(name);
                });
            });
        }

        function updateSliderDisplay(name) {
            const val = state[name];
            document.getElementById(name + 'Num').textContent = val;
            
            let word = '';
            if (name === 'pressure') {
                word = val <= 2 ? '很放鬆' : val <= 4 ? '平穩' : val <= 6 ? '還好' : val <= 8 ? '有點緊' : '很緊繃';
            } else if (name === 'clarity') {
                word = val <= 2 ? '很模糊' : val <= 4 ? '有點朦' : val <= 6 ? '普通' : val <= 8 ? '清晰' : '非常清晰';
            } else if (name === 'energy') {
                word = val <= 2 ? '快沒電' : val <= 4 ? '偏低' : val <= 6 ? '一半' : val <= 8 ? '充足' : '滿電';
            }
            document.getElementById(name + 'Word').textContent = word;
        }

        function setupTextareas() {
            const textareas = ['gratitude', 'reflection'];
            textareas.forEach(name => {
                const ta = document.getElementById(name);
                ta.addEventListener('input', (e) => {
                    state[name] = e.target.value.slice(0, 100);
                    document.getElementById(name + 'Count').textContent = state[name].length;
                });
            });
        }

        function toggleActivity(name) {
            state[name] = !state[name];
            const btn = document.getElementById(name + 'Btn');
            btn.classList.toggle('active');
        }

        // ===== 預填充：載入當天的資料 =====
        async function loadTodayRecord() {
            const loadIndicator = document.getElementById('loadIndicator');
            loadIndicator.textContent = '📂 載入中...';

            try {
                const today = new Date().toISOString().split('T')[0];
                const response = await fetch(`${SCRIPT_URL}?date=${today}`);
                const result = await response.json();

                if (result.success && result.found) {
                    // 有找到今天的記錄，填入表單
                    const data = result.data;

                    // 填入滑桿值
                    if (data.壓力分數) {
                        state.pressure = data.壓力分數;
                        document.getElementById('pressure').value = data.壓力分數;
                        updateSliderDisplay('pressure');
                    }

                    if (data.思路清晰度) {
                        state.clarity = data.思路清晰度;
                        document.getElementById('clarity').value = data.思路清晰度;
                        updateSliderDisplay('clarity');
                    }

                    if (data.睡前電量) {
                        state.energy = data.睡前電量;
                        document.getElementById('energy').value = data.睡前電量;
                        updateSliderDisplay('energy');
                    }

                    // 填入活動按鈕
                    if (data.散步) {
                        state.walk = true;
                        document.getElementById('walkBtn').classList.add('active');
                    }
                    if (data.冥想) {
                        state.meditate = true;
                        document.getElementById('meditateBtn').classList.add('active');
                    }
                    if (data.重訓) {
                        state.strength = true;
                        document.getElementById('strengthBtn').classList.add('active');
                    }
                    if (data.跑步) {
                        state.run = true;
                        document.getElementById('runBtn').classList.add('active');
                    }

                    // 填入文字欄
                    if (data.輕量感恩) {
                        state.gratitude = data.輕量感恩;
                        document.getElementById('gratitude').value = data.輕量感恩;
                        document.getElementById('gratitudeCount').textContent = data.輕量感恩.length;
                    }

                    if (data.反思) {
                        state.reflection = data.反思;
                        document.getElementById('reflection').value = data.反思;
                        document.getElementById('reflectionCount').textContent = data.反思.length;
                    }

                    loadIndicator.textContent = '✓ 已載入今日記錄';
                    loadIndicator.classList.add('done');
                } else {
                    // 今天還沒有記錄
                    loadIndicator.textContent = '';
                }
            } catch (error) {
                console.error('載入失敗:', error);
                loadIndicator.textContent = '⚠️ 載入失敗';
                loadIndicator.classList.add('done');
            }
        }

        function submitForm() {
            if (state.submitting) return;
            
            state.submitting = true;
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '正在記錄⋯';
            document.getElementById('errorMsg').classList.remove('show');

            const today = new Date();
            const data = {
                date: today.toISOString().split('T')[0],
                壓力分數: state.pressure,
                思路清晰度: state.clarity,
                睡前電量: state.energy,
                散步: state.walk,
                冥想: state.meditate,
                重訓: state.strength,
                跑步: state.run,
                輕量感恩: state.gratitude,
                反思: state.reflection
            };

            // 使用 no-cors 模式
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => {
                // no-cors 模式下無法讀取響應，假設成功
                showSuccess();
                state.submitting = false;
                resetForm();
            })
            .catch(err => {
                showError('網路錯誤：' + err.message);
                state.submitting = false;
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').textContent = '完成今晚的紀錄 ✨';
            });
        }

        function showSuccess() {
            document.getElementById('successModal').classList.add('show');
            setTimeout(() => {
                document.getElementById('successModal').classList.remove('show');
            }, 3000);
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = msg;
            errorEl.classList.add('show');
        }

        function resetForm() {
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '完成今晚的紀錄 ✨';
        }

        // 頁面加載時初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
